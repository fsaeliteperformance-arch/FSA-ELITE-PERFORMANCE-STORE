name: End to End Tests

on:
  deployment_status:
  repository_dispatch:
    types:
      - vercel.deployment.success

permissions:
  contents: read

jobs:
  run-end-to-end-tests:
    if: |
      (github.event_name == 'deployment_status' && github.event.deployment_status.state == 'success') ||
      (github.event_name == 'repository_dispatch' && github.event.action == 'vercel.deployment.success')
    runs-on: ubuntu-latest
    env:
      BASE_URL: ${{ github.event.client_payload.url || github.event.deployment_status.environment_url }}

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.client_payload.sha || github.event.deployment.sha || github.sha }}

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps

      - name: Validate BASE_URL
        run: |
          if [ -z "$BASE_URL" ]; then
            echo "BASE_URL is required but empty."
            exit 1
          fi

      - name: Detect Playwright test files
        id: detect_playwright_tests
        run: |
          PLAYWRIGHT_TEST_PATTERN='(^|/)(e2e|playwright|tests/e2e)/.*\.(spec|test)\.(ts|tsx|js|jsx|mjs|cjs|mts|cts)$'
          if git ls-files | grep -Eq "$PLAYWRIGHT_TEST_PATTERN"; then
            echo "has_tests=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_tests=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Run tests
        if: steps.detect_playwright_tests.outputs.has_tests == 'true'
        run: npx playwright test

      - name: Skip when no Playwright tests are present
        if: steps.detect_playwright_tests.outputs.has_tests == 'false'
        run: echo "No Playwright tests found in tracked e2e paths; skipping Playwright run."
