name: Full Checks (integration)

on:
  push:
    branches:
      - integration
  pull_request:
    branches:
      - integration

permissions:
  contents: read

jobs:
  full-checks:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Ensure Stripe secret is configured
        run: |
          if [ -z "${{ secrets.STRIPE_SECRET_KEY }}" ]; then
            echo "STRIPE_SECRET_KEY repository secret is required for integration full checks."
            exit 1
          fi

      - name: Build
        env:
          STRIPE_SECRET_KEY: ${{ secrets.STRIPE_SECRET_KEY }}
        run: npm run build
