name: End-to-End Tests

on:
  deployment_status:
  repository_dispatch:
    types:
      - vercel.deployment.success

permissions:
  contents: read

jobs:
  run-end-to-end-tests:
    if: |
      (github.event_name == 'deployment_status' && github.event.deployment_status.state == 'success') ||
      (github.event_name == 'repository_dispatch' && github.event.client_payload.url != '')
    runs-on: ubuntu-latest
    env:
      BASE_URL: ${{ github.event.client_payload.url || github.event.deployment_status.environment_url || github.event.deployment_status.target_url }}

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.client_payload.sha || github.event.deployment.sha || github.sha }}

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps

      - name: Validate BASE_URL
        env:
          EVENT_NAME: ${{ github.event_name }}
        run: |
          if [ -z "$BASE_URL" ]; then
            echo "BASE_URL is required for event '$EVENT_NAME' but is empty. Provide client_payload.url for repository_dispatch or deployment_status.environment_url/target_url for deployment_status."
            exit 1
          fi

      - name: Run tests
        run: npx playwright test
