<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 600" width="600" height="600">
  <rect width="600" height="600" fill="#1a1a2e"/>
  <!-- Notebook cover -->
  <rect x="150" y="100" width="300" height="400" rx="8" fill="#2a2a4e" stroke="#e94560" stroke-width="4"/>
  <!-- Spine detail -->
  <rect x="150" y="100" width="24" height="400" rx="4" fill="#e94560"/>
  <!-- Spiral binding -->
  <circle cx="150" cy="140" r="10" fill="none" stroke="#ffffff" stroke-width="3"/>
  <circle cx="150" cy="180" r="10" fill="none" stroke="#ffffff" stroke-width="3"/>
  <circle cx="150" cy="220" r="10" fill="none" stroke="#ffffff" stroke-width="3"/>
  <circle cx="150" cy="260" r="10" fill="none" stroke="#ffffff" stroke-width="3"/>
  <circle cx="150" cy="300" r="10" fill="none" stroke="#ffffff" stroke-width="3"/>
  <circle cx="150" cy="340" r="10" fill="none" stroke="#ffffff" stroke-width="3"/>
  <circle cx="150" cy="380" r="10" fill="none" stroke="#ffffff" stroke-width="3"/>
  <circle cx="150" cy="420" r="10" fill="none" stroke="#ffffff" stroke-width="3"/>
  <circle cx="150" cy="460" r="10" fill="none" stroke="#ffffff" stroke-width="3"/>
  <!-- Logo area -->
  <text x="310" y="230" font-family="Arial, sans-serif" font-size="28" font-weight="bold" fill="#ffffff" text-anchor="middle">FSA</text>
  <text x="310" y="265" font-family="Arial, sans-serif" font-size="28" font-weight="bold" fill="#e94560" text-anchor="middle">ELITE</text>
  <!-- Dotted page pattern preview -->
  <rect x="185" y="295" width="240" height="140" rx="4" fill="#1a1a2e" opacity="0.6"/>
  <g fill="#ffffff" opacity="0.4">
    <circle cx="210" cy="320" r="2"/><circle cx="240" cy="320" r="2"/><circle cx="270" cy="320" r="2"/><circle cx="300" cy="320" r="2"/><circle cx="330" cy="320" r="2"/><circle cx="360" cy="320" r="2"/><circle cx="390" cy="320" r="2"/>
    <circle cx="210" cy="350" r="2"/><circle cx="240" cy="350" r="2"/><circle cx="270" cy="350" r="2"/><circle cx="300" cy="350" r="2"/><circle cx="330" cy="350" r="2"/><circle cx="360" cy="350" r="2"/><circle cx="390" cy="350" r="2"/>
    <circle cx="210" cy="380" r="2"/><circle cx="240" cy="380" r="2"/><circle cx="270" cy="380" r="2"/><circle cx="300" cy="380" r="2"/><circle cx="330" cy="380" r="2"/><circle cx="360" cy="380" r="2"/><circle cx="390" cy="380" r="2"/>
    <circle cx="210" cy="410" r="2"/><circle cx="240" cy="410" r="2"/><circle cx="270" cy="410" r="2"/><circle cx="300" cy="410" r="2"/><circle cx="330" cy="410" r="2"/><circle cx="360" cy="410" r="2"/><circle cx="390" cy="410" r="2"/>
  </g>
  <!-- Label at bottom -->
  <rect x="0" y="530" width="600" height="70" fill="#0d0d1a"/>
  <text x="300" y="572" font-family="Arial, sans-serif" font-size="20" font-weight="bold" fill="#ffffff" text-anchor="middle">Hardcover Notebook</text>
</svg>
