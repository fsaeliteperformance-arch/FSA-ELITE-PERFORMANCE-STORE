<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 600" width="600" height="600">
  <rect width="600" height="600" fill="#e94560"/>
  <!-- Book cover -->
  <rect x="140" y="100" width="280" height="380" rx="12" fill="#c73248" stroke="#ffffff" stroke-width="4"/>
  <!-- Book spine -->
  <rect x="140" y="100" width="30" height="380" rx="4" fill="#a01f30"/>
  <!-- Book pages edge -->
  <rect x="398" y="108" width="12" height="364" rx="2" fill="#f5f5f5"/>
  <!-- Title area -->
  <rect x="170" y="140" width="220" height="120" rx="8" fill="#1a1a2e" opacity="0.8"/>
  <text x="280" y="190" font-family="Arial, sans-serif" font-size="22" font-weight="bold" fill="#ffffff" text-anchor="middle">FSA ELITE</text>
  <text x="280" y="218" font-family="Arial, sans-serif" font-size="14" fill="#e94560" text-anchor="middle">SALES PLAYBOOK</text>
  <!-- Digital badge -->
  <rect x="200" y="280" width="160" height="36" rx="18" fill="#1a1a2e"/>
  <text x="280" y="304" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#e94560" text-anchor="middle">▶ DIGITAL EDITION</text>
  <!-- Lines representing text -->
  <rect x="170" y="340" width="200" height="8" rx="4" fill="#ffffff" opacity="0.5"/>
  <rect x="170" y="360" width="180" height="8" rx="4" fill="#ffffff" opacity="0.5"/>
  <rect x="170" y="380" width="190" height="8" rx="4" fill="#ffffff" opacity="0.5"/>
  <rect x="170" y="400" width="160" height="8" rx="4" fill="#ffffff" opacity="0.5"/>
  <!-- Label at bottom -->
  <rect x="0" y="530" width="600" height="70" fill="#0d0d1a"/>
  <text x="300" y="565" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#ffffff" text-anchor="middle">Sales Playbook</text>
  <text x="300" y="588" font-family="Arial, sans-serif" font-size="14" fill="#e94560" text-anchor="middle">Digital Edition</text>
</svg>
